# Task-specific distillation
# Fine-tunes the general-distilled student on a downstream GLUE task
# using both intermediate-layer and prediction-layer distillation

defaults:
  - model/teacher: teacher
  - model/student: student

# Task
task:
  name: "mnli"
  num_labels: 3
  metric: "accuracy"

# Distillation hyper-parameters
distillation:
  teacher_layer_indices: [2, 5, 8, 11]

  # Stage 2a: intermediate distillation on task data
  alpha_embd: 1.0
  alpha_hidn: 1.0
  alpha_attn: 1.0

  # Stage 2b: prediction-layer distillation
  alpha_pred: 1.0        # KL-div on soft logits
  alpha_hard: 0.0        # optional CE on ground-truth labels
  temperature: 4.0

  # teacher_label_remap: [1, 2, 0]

# Teacher checkpoint fine-tuned on this task
teacher_ckpt: "textattack/bert-base-uncased-MNLI"

# Training
training:
  # Stage 2a (intermediate distillation on task data)
  stage2a:
    max_epochs: 20
    learning_rate: 5.0e-5
    weight_decay: 0.01
    warmup_ratio: 0.1
    batch_size: 32

  # Stage 2b (prediction-layer distillation)
  stage2b:
    max_epochs: 3
    learning_rate: 3.0e-5
    weight_decay: 0.01
    warmup_ratio: 0.1
    batch_size: 32

  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  precision: "16-mixed"
  num_workers: 0
  seed: 42

# Data
data:
  max_seq_length: 128
  augment: true                  # data augmentation via word replacement

# Paths
paths:
  output_dir: "outputs/task_distill"
  student_general_ckpt: "outputs/general_distill/last.ckpt"   # from Stage 1
  cache_dir: null 

# Logging
logging:
  project: "tinybert-task"
  logger: "wandb"
  log_every_n_steps: 20
